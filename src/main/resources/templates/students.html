<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students — Sunday School</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Students</h1>
                    <p>Manage student profiles and details.</p>
                </div>
                <div class="flex-row">
                    <div class="search-bar">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" placeholder="Search by name...">
                    </div>
                    <button class="btn btn-primary teacher-only" onclick="openModal('addStudentModal')">+ Add
                        Student</button>
                </div>
            </div>

            <!-- Filter by class -->
            <div class="tabs" id="classTabs">
                <button class="tab-btn active" data-class="all">All Classes</button>
            </div>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Class</th>
                                <th>Gender</th>
                                <th>Age</th>
                                <th>Attendance %</th>
                                <th>Total Marks</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentsTable">
                            <tr>
                                <td colspan="8">
                                    <div class="loading-overlay"><span class="spinner"></span></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Student Modal -->
    <div class="modal-overlay" id="addStudentModal">
        <div class="modal">
            <h2>Add New Student</h2>
            <form id="addStudentForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="sFullName" required>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Gender</label>
                        <select class="form-control" id="sGender" required>
                            <option value="MALE">Male</option>
                            <option value="FEMALE">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" class="form-control" id="sAge" min="3" max="25">
                    </div>
                </div>
                <div class="form-group">
                    <label>Class</label>
                    <select class="form-control" id="sClassId" required></select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal('addStudentModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Student</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        initLayout();
        let allStudents = [];
        let allClasses = [];

        async function loadData() {
            try {
                [allStudents, allClasses] = await Promise.all([
                    apiFetch('/api/students'),
                    apiFetch('/api/classes')
                ]);

                // Build class tabs
                const tabs = document.getElementById('classTabs');
                tabs.innerHTML = '<button class="tab-btn active" data-class="all">All Classes</button>' +
                    allClasses.map(c => `<button class="tab-btn" data-class="${c.classId}">${c.className}</button>`).join('');

                // Class select in modal
                document.getElementById('sClassId').innerHTML = allClasses.map(c =>
                    `<option value="${c.classId}">${c.className}</option>`).join('');

                // Tab click handlers
                tabs.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        tabs.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        renderStudents(btn.dataset.class);
                    });
                });

                // Check URL param for classId filter
                const params = new URLSearchParams(window.location.search);
                const classIdParam = params.get('classId');
                if (classIdParam) {
                    const tabBtn = tabs.querySelector(`[data-class="${classIdParam}"]`);
                    if (tabBtn) { tabBtn.click(); return; }
                }

                renderStudents('all');
            } catch (err) {
                showToast('Failed to load students', 'error');
            }
        }

        async function renderStudents(classFilter) {
            const tbody = document.getElementById('studentsTable');
            let students = allStudents;
            if (classFilter !== 'all') {
                students = students.filter(s => s.sundayClass && s.sundayClass.classId == classFilter);
            }

            // Fetch details for enriched view
            const details = [];
            for (const s of students) {
                try {
                    const d = await apiFetch('/api/students/' + s.studentId + '/details');
                    details.push(d);
                } catch (e) {
                    details.push({ studentId: s.studentId, fullName: s.fullName, className: s.sundayClass?.className, attendancePercentage: 0, totalMarks: 0, active: s.active, gender: s.gender, age: s.age });
                }
            }

            if (details.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">👨‍🎓</div><p>No students found</p></div></td></tr>';
                return;
            }

            tbody.innerHTML = details.map((s, i) => `
                <tr class="animate-in" style="animation-delay:${i * 0.04}s; cursor:pointer" onclick="window.location.href='/students/${s.studentId}/profile'">
                    <td><strong>${s.fullName}</strong></td>
                    <td>${s.className || '-'}</td>
                    <td>${s.gender || '-'}</td>
                    <td>${s.age || '-'}</td>
                    <td>
                        <div class="flex-row gap-8">
                            <div class="progress-bar" style="width:80px"><div class="progress-fill" style="width:${s.attendancePercentage}%"></div></div>
                            <span style="font-size:12px;color:var(--text-secondary)">${s.attendancePercentage.toFixed(1)}%</span>
                        </div>
                    </td>
                    <td><strong>${s.totalMarks}</strong></td>
                    <td><span class="badge ${s.active ? 'badge-active' : 'badge-inactive'}">${s.active ? 'Active' : 'Inactive'}</span></td>
                    <td>
                        <div class="flex-row gap-8">
                            <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); window.location.href='/students/${s.studentId}/profile'">View</button>
                            <button class="btn btn-sm btn-danger teacher-only" onclick="event.stopPropagation(); deleteStudent(${s.studentId})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', debounce(async (e) => {
            const q = e.target.value.trim();
            if (q.length < 2) { renderStudents('all'); return; }
            try {
                const results = await apiFetch('/api/students/search?name=' + encodeURIComponent(q));
                allStudents = results;
                renderStudents('all');
            } catch (e) { }
        }, 300));

        // Add student
        document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await apiFetch('/api/students', {
                    method: 'POST',
                    body: JSON.stringify({
                        fullName: document.getElementById('sFullName').value,
                        gender: document.getElementById('sGender').value,
                        age: parseInt(document.getElementById('sAge').value) || null,
                        classId: parseInt(document.getElementById('sClassId').value)
                    })
                });
                showToast('Student added!', 'success');
                closeModal('addStudentModal');
                loadData();
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to remove this student?')) return;
            try {
                await apiFetch('/api/students/' + id, { method: 'DELETE' });
                showToast('Student removed!', 'success');
                loadData();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        loadData();
    </script>
</body>

</html>
