<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lessons — Sunday School</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Weekly Lessons</h1>
                    <p>Manage lessons and word of the week for each class.</p>
                </div>
                <button class="btn btn-primary teacher-only" onclick="openModal('addLessonModal')">+ Add Lesson</button>
            </div>

            <div class="tabs" id="classTabs"><button class="tab-btn active" data-class="">Loading...</button></div>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Week</th>
                                <th>Lesson Name</th>
                                <th>Word of the Week</th>
                                <th>Date</th>
                                <th class="teacher-only">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="lessonsTable">
                            <tr>
                                <td colspan="5">
                                    <div class="loading-overlay"><span class="spinner"></span></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="addLessonModal">
        <div class="modal">
            <h2 id="lessonModalTitle">Add Lesson</h2>
            <form id="lessonForm">
                <input type="hidden" id="editLessonId">
                <div class="form-group"><label>Class</label><select class="form-control" id="lClassId"
                        required></select></div>
                <div class="form-group"><label>Lesson Name</label><input type="text" class="form-control" id="lName"
                        required></div>
                <div class="form-group"><label>Word of the Week</label><input type="text" class="form-control"
                        id="lWord" required></div>
                <div class="grid-2">
                    <div class="form-group"><label>Week Number</label><input type="number" class="form-control"
                            id="lWeek" min="1"></div>
                    <div class="form-group"><label>Date</label><input type="date" class="form-control" id="lDate"
                            required></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal('addLessonModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        initLayout();
        let classes = [], currentClassId = null;

        (async function init() {
            classes = await apiFetch('/api/classes');
            const tabs = document.getElementById('classTabs');
            document.getElementById('lClassId').innerHTML = classes.map(c => `<option value="${c.classId}">${c.className}</option>`).join('');
            if (classes.length === 0) { tabs.innerHTML = '<span style="color:var(--text-muted);padding:10px">No classes</span>'; return; }
            tabs.innerHTML = classes.map((c, i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" data-class="${c.classId}">${c.className}</button>`).join('');
            tabs.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
                tabs.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadLessons(btn.dataset.class);
            }));
            loadLessons(classes[0].classId);
        })();

        async function loadLessons(classId) {
            currentClassId = classId;
            const tbody = document.getElementById('lessonsTable');
            try {
                const lessons = await apiFetch('/api/lessons/class/' + classId);
                if (lessons.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📖</div><p>No lessons yet</p></div></td></tr>';
                } else {
                    tbody.innerHTML = lessons.map(l => `<tr>
                        <td>${l.weekNumber || '-'}</td>
                        <td><strong>${l.lessonName}</strong></td>
                        <td><span style="color:var(--accent-pink)">${l.wordOfWeek}</span></td>
                        <td>${formatDate(l.weekDate)}</td>
                        <td class="teacher-only">
                            <button class="btn btn-sm btn-secondary" onclick="editLesson(${l.lessonId})">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteLesson(${l.lessonId})">Delete</button>
                        </td>
                    </tr>`).join('');
                }
            } catch (e) { showToast(e.message, 'error'); }
        }

        document.getElementById('lessonForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editLessonId').value;
            const body = {
                lessonName: document.getElementById('lName').value,
                wordOfWeek: document.getElementById('lWord').value,
                weekNumber: parseInt(document.getElementById('lWeek').value) || null,
                weekDate: document.getElementById('lDate').value,
                sundayClass: { classId: parseInt(document.getElementById('lClassId').value) }
            };
            try {
                if (id) { await apiFetch('/api/lessons/' + id, { method: 'PUT', body: JSON.stringify(body) }); }
                else { await apiFetch('/api/lessons', { method: 'POST', body: JSON.stringify(body) }); }
                showToast('Lesson saved!', 'success');
                closeModal('addLessonModal');
                loadLessons(currentClassId);
            } catch (e) { showToast(e.message, 'error'); }
        });

        async function deleteLesson(id) {
            if (!confirm('Delete this lesson?')) return;
            try { await apiFetch('/api/lessons/' + id, { method: 'DELETE' }); showToast('Deleted!', 'success'); loadLessons(currentClassId); }
            catch (e) { showToast(e.message, 'error'); }
        }

        function editLesson(id) {
            // Simple edit: open modal with empty fields and set editLessonId
            document.getElementById('editLessonId').value = id;
            document.getElementById('lessonModalTitle').textContent = 'Edit Lesson';
            openModal('addLessonModal');
        }
    </script>
</body>

</html>
