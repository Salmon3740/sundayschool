<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class View — Sunday School</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Lesson / Word of the Week editable blocks */
        .wotw-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        .wotw-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            position: relative;
            transition: var(--transition);
        }

        .wotw-card:hover {
            border-color: rgba(124, 58, 237, 0.2);
        }

        .wotw-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .wotw-value {
            font-size: 22px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-height: 32px;
        }

        .wotw-edit-row {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            display: none;
            /* shown for teachers via JS */
        }

        .wotw-edit-row.teacher-visible {
            display: flex;
        }

        .wotw-edit-input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: var(--transition);
        }

        .wotw-edit-input:focus {
            border-color: var(--accent-primary);
        }

        /* Attendance actions toolbar */
        .att-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .att-toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Pill status */
        .att-pct-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-bar {
            width: 80px;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* Student card grid (class cards look) */
        .class-hero {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            padding: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
        }

        .class-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
        }

        .class-hero-icon {
            font-size: 48px;
        }

        .class-hero-name {
            font-size: 32px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .class-hero-sub {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Toggle switch styling */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: rgba(239, 68, 68, 0.4);
            border-radius: 26px;
            transition: var(--transition);
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: var(--transition);
        }

        .toggle-switch input:checked+.toggle-slider {
            background: rgba(16, 185, 129, 0.5);
        }

        .toggle-switch input:checked+.toggle-slider::before {
            transform: translateX(22px);
        }

        .attendance-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .attendance-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .attendance-row:hover {
            background: rgba(255, 255, 255, 0.06);
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">

            <!-- Class Hero -->
            <div class="class-hero" id="classHero">
                <div class="class-hero-icon" id="classIcon">🏫</div>
                <div>
                    <div class="class-hero-name" id="className">Loading...</div>
                    <div class="class-hero-sub" id="classStudentCount">Loading students...</div>
                </div>
                <div style="margin-left:auto">
                    <a href="/dashboard" class="btn btn-secondary btn-sm">← Back to Dashboard</a>
                </div>
            </div>

            <!-- Word of the Week & Lesson of the Week -->
            <div class="wotw-section">
                <div class="wotw-card">
                    <div class="wotw-label">💬 Word of the Week</div>
                    <div class="wotw-value" id="wordOfWeek">—</div>
                    <div class="wotw-edit-row" id="wordEditRow">
                        <input type="text" class="wotw-edit-input" id="wordInput"
                            placeholder="Enter word of the week...">
                        <button class="btn btn-primary btn-sm" onclick="saveClassWord()">Save</button>
                    </div>
                </div>
                <div class="wotw-card">
                    <div class="wotw-label">📖 Lesson of the Week</div>
                    <div class="wotw-value" id="lessonOfWeek">—</div>
                    <div class="wotw-edit-row" id="lessonEditRow">
                        <input type="text" class="wotw-edit-input" id="lessonInput" placeholder="Enter lesson name...">
                        <button class="btn btn-primary btn-sm" onclick="saveClassLesson()">Save</button>
                    </div>
                </div>
            </div>

            <!-- Teacher: Attendance Marking Panel -->
            <div class="card mb-24 teacher-only" id="attMarkingPanel" style="display:none">
                <div class="card-header">
                    <h2>✏️ Mark Attendance</h2>
                </div>
                <div class="att-toolbar">
                    <div class="att-toolbar-left">
                        <div class="form-group" style="margin:0">
                            <input type="date" class="form-control" id="attDate" style="max-width:180px">
                        </div>
                        <button class="btn btn-success btn-sm" onclick="markAllClass(true)">✅ All Present</button>
                        <button class="btn btn-danger btn-sm" onclick="markAllClass(false)">❌ All Absent</button>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="saveAttendance()">💾 Save Attendance</button>
                </div>
                <div class="attendance-list" id="attendanceStudents"></div>
            </div>

            <!-- Student Table -->
            <div class="card">
                <div class="card-header">
                    <h2>👨‍🎓 Students</h2>
                    <button class="btn btn-primary btn-sm teacher-only" onclick="openModal('addStudentModal')">+ Add
                        Student</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Student ID</th>
                                <th>Age</th>
                                <th>Attendance %</th>
                                <th>Total Marks</th>
                                <th>Class</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTable">
                            <tr>
                                <td colspan="8">
                                    <div class="loading-overlay"><span class="spinner"></span></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Add Student Modal -->
    <div class="modal-overlay" id="addStudentModal">
        <div class="modal">
            <h2>Add New Student</h2>
            <form id="addStudentForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="sFullName" required>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Gender</label>
                        <select class="form-control" id="sGender" required>
                            <option value="MALE">Male</option>
                            <option value="FEMALE">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" class="form-control" id="sAge" min="3" max="25">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal('addStudentModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Student</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        initLayout();

        // Extract class ID from URL path: /class/3 -> 3
        const classId = window.location.pathname.split('/').pop();
        const CLASS_ICONS = ['🌱', '🌼', '⭐', '🎓', '🏆'];
        let classData = null;
        let students = [];

        // Set today's date
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('attDate').value = today;

        // Show teacher-specific sections
        if (isTeacher()) {
            document.getElementById('attMarkingPanel').style.display = 'block';
            document.getElementById('wordEditRow').classList.add('teacher-visible');
            document.getElementById('lessonEditRow').classList.add('teacher-visible');
        }

        (async function init() {
            try {
                // Load class info
                classData = await apiFetch('/api/classes/' + classId);
                const idx = parseInt(classId) - 1;
                document.getElementById('classIcon').textContent = CLASS_ICONS[idx % CLASS_ICONS.length] || '🏫';
                document.getElementById('className').textContent = classData.className;

                // Word & lesson from class object
                document.getElementById('wordOfWeek').textContent = classData.wordOfTheWeek || '—';
                document.getElementById('lessonOfWeek').textContent = classData.lessonName || '—';

                // Pre-fill inputs
                document.getElementById('wordInput').value = classData.wordOfTheWeek || '';
                document.getElementById('lessonInput').value = classData.lessonName || '';

                // Try to get latest lesson for this class
                try {
                    const latestLesson = await apiFetch('/api/lessons/class/' + classId + '/latest');
                    if (latestLesson) {
                        document.getElementById('lessonOfWeek').textContent = latestLesson.lessonName || '—';
                        document.getElementById('wordOfWeek').textContent = latestLesson.wordOfWeek || classData.wordOfTheWeek || '—';
                        document.getElementById('lessonInput').value = latestLesson.lessonName || '';
                        document.getElementById('wordInput').value = latestLesson.wordOfWeek || '';
                    }
                } catch (e) { /* use class-level data */ }

                // Load students
                await loadStudents();

            } catch (err) {
                showToast('Failed to load class: ' + err.message, 'error');
            }
        })();

        async function loadStudents() {
            const tbody = document.getElementById('studentTable');
            const attContainer = document.getElementById('attendanceStudents');
            try {
                const rawStudents = await apiFetch('/api/classes/' + classId + '/students');
                students = rawStudents;

                document.getElementById('classStudentCount').textContent =
                    students.length + ' student' + (students.length !== 1 ? 's' : '') + ' enrolled';

                if (students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">👨‍🎓</div><p>No students in this class yet</p></div></td></tr>';
                    attContainer.innerHTML = '<div class="empty-state"><p>No students to mark attendance for</p></div>';
                    return;
                }

                // Attendance rows
                attContainer.innerHTML = students.map(s => `
                    <div class="attendance-row" data-id="${s.studentId}">
                        <span><strong>${s.fullName}</strong></span>
                        <label class="toggle-switch">
                            <input type="checkbox" checked data-student="${s.studentId}">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                `).join('');

                // Fetch enriched details for table
                const details = await Promise.all(students.map(async s => {
                    try {
                        return await apiFetch('/api/students/' + s.studentId + '/details');
                    } catch (e) {
                        return {
                            studentId: s.studentId,
                            fullName: s.fullName,
                            age: s.age,
                            className: classData ? classData.className : '-',
                            attendancePercentage: 0,
                            totalMarks: 0,
                            active: s.active,
                            gender: s.gender
                        };
                    }
                }));

                tbody.innerHTML = details.map((s, i) => `
                    <tr class="animate-in" style="animation-delay:${i * 0.04}s; cursor:pointer"
                        onclick="window.location.href='/students/${s.studentId}/profile'">
                        <td><strong>${s.fullName}</strong></td>
                        <td><code style="color:var(--text-secondary);font-size:12px">#${s.studentId}</code></td>
                        <td>${s.age || '—'}</td>
                        <td>
                            <div class="att-pct-bar">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width:${s.attendancePercentage}%"></div>
                                </div>
                                <span style="font-size:12px;color:var(--text-secondary)">${s.attendancePercentage.toFixed(1)}%</span>
                            </div>
                        </td>
                        <td><strong>${s.totalMarks}</strong></td>
                        <td>${s.className || '—'}</td>
                        <td><span class="badge ${s.active ? 'badge-active' : 'badge-inactive'}">${s.active ? 'Active' : 'Inactive'}</span></td>
                        <td>
                            <div class="flex-row gap-8">
                                <button class="btn btn-sm btn-secondary"
                                    onclick="event.stopPropagation(); window.location.href='/students/${s.studentId}/profile'">
                                    View
                                </button>
                                <button class="btn btn-sm btn-danger teacher-only"
                                    onclick="event.stopPropagation(); deleteStudent(${s.studentId})">
                                    Delete
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                showToast('Failed to load students: ' + err.message, 'error');
            }
        }

        // === Attendance ===
        async function markAllClass(present) {
            const date = document.getElementById('attDate').value;
            if (!date) { showToast('Please select a date', 'error'); return; }
            try {
                await apiFetch('/api/attendance/mark-class?classId=' + classId + '&date=' + date + '&present=' + present,
                    { method: 'POST' });
                document.querySelectorAll('#attendanceStudents input[type="checkbox"]').forEach(cb => cb.checked = present);
                showToast('All students marked ' + (present ? 'present' : 'absent') + '!', 'success');
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function saveAttendance() {
            const date = document.getElementById('attDate').value;
            if (!date) { showToast('Please select a date', 'error'); return; }
            const checkboxes = document.querySelectorAll('#attendanceStudents input[type="checkbox"]');
            if (checkboxes.length === 0) { showToast('No students to mark', 'error'); return; }
            try {
                for (const cb of checkboxes) {
                    await apiFetch(
                        '/api/attendance/mark?studentId=' + cb.dataset.student + '&date=' + date + '&present=' + cb.checked,
                        { method: 'POST' }
                    );
                }
                showToast('Attendance saved successfully!', 'success');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // === Word & Lesson of the Week ===
        async function saveClassWord() {
            const word = document.getElementById('wordInput').value.trim();
            if (!word) return;
            try {
                await apiFetch('/api/classes/' + classId, {
                    method: 'PUT',
                    body: JSON.stringify({ ...classData, wordOfTheWeek: word })
                });
                document.getElementById('wordOfWeek').textContent = word;
                classData.wordOfTheWeek = word;
                showToast('Word of the Week updated!', 'success');
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function saveClassLesson() {
            const lesson = document.getElementById('lessonInput').value.trim();
            if (!lesson) return;
            try {
                await apiFetch('/api/classes/' + classId, {
                    method: 'PUT',
                    body: JSON.stringify({ ...classData, lessonName: lesson })
                });
                document.getElementById('lessonOfWeek').textContent = lesson;
                classData.lessonName = lesson;
                showToast('Lesson of the Week updated!', 'success');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // === Add Student ===
        document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await apiFetch('/api/students', {
                    method: 'POST',
                    body: JSON.stringify({
                        fullName: document.getElementById('sFullName').value,
                        gender: document.getElementById('sGender').value,
                        age: parseInt(document.getElementById('sAge').value) || null,
                        classId: parseInt(classId)
                    })
                });
                showToast('Student added!', 'success');
                closeModal('addStudentModal');
                document.getElementById('addStudentForm').reset();
                await loadStudents();
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to remove this student?')) return;
            try {
                await apiFetch('/api/students/' + id, { method: 'DELETE' });
                showToast('Student removed!', 'success');
                await loadStudents();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }
    </script>
</body>

</html>
