<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Sunday School</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Dashboard</h1>
                    <p>Welcome back! Here's an overview of your Sunday School.</p>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid">
                <div class="stat-card purple">
                    <div class="stat-icon">👨‍🎓</div>
                    <div class="stat-value" id="totalStudents">-</div>
                    <div class="stat-label">Total Students</div>
                </div>
                <div class="stat-card pink">
                    <div class="stat-icon">🏫</div>
                    <div class="stat-value" id="totalClasses">-</div>
                    <div class="stat-label">Classes</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-icon">📖</div>
                    <div class="stat-value" id="totalLessons">-</div>
                    <div class="stat-label">Total Lessons</div>
                </div>
                <div class="stat-card orange">
                    <div class="stat-icon">🎵</div>
                    <div class="stat-value" id="totalSongs">-</div>
                    <div class="stat-label">Songs &amp; Stories</div>
                </div>
            </div>

            <div class="grid-2" style="margin-bottom: 32px;">
                <div class="card">
                    <div class="card-header">
                        <h2>📋 Classes</h2>
                        <a href="/attendance" class="btn btn-sm btn-secondary">View Attendance</a>
                    </div>
                    <div id="classesContainer" class="class-cards">
                        <div class="loading-overlay"><span class="spinner"></span></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h2>🆕 Recent Students</h2>
                        <a href="/students" class="btn btn-sm btn-secondary">View All</a>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Class</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="recentStudents">
                                <tr>
                                    <td colspan="3">
                                        <div class="loading-overlay"><span class="spinner"></span></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
    <script>
        initLayout();

        (async function loadDashboard() {
            try {
                const [students, classes, songs] = await Promise.all([
                    apiFetch('/api/students'),
                    apiFetch('/api/classes'),
                    apiFetch('/api/songs-stories')
                ]);

                document.getElementById('totalStudents').textContent = students.length;
                document.getElementById('totalClasses').textContent = classes.length;
                document.getElementById('totalSongs').textContent = songs.length;

                // Try lessons count
                let lessonCount = 0;
                for (const c of classes) {
                    try {
                        const lessons = await apiFetch('/api/lessons/class/' + c.classId);
                        lessonCount += lessons.length;
                    } catch (e) { }
                }
                document.getElementById('totalLessons').textContent = lessonCount;

                // Render classes
                const classesEl = document.getElementById('classesContainer');
                if (classes.length === 0) {
                    classesEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🏫</div><p>No classes yet</p></div>';
                } else {
                    classesEl.innerHTML = classes.map(c => `
                        <div class="class-card" onclick="window.location.href='/class/${c.classId}'">
                            <h3>${c.className}</h3>
                            <div class="class-meta">
                                <span>📖 ${c.lessonName || 'No lesson'}</span>
                                <span>💬 ${c.wordOfTheWeek || '-'}</span>
                            </div>
                        </div>
                    `).join('');
                }

                // Render recent students (latest 5)
                const tbody = document.getElementById('recentStudents');
                const recent = students.slice(-5).reverse();
                if (recent.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><p>No students yet</p></div></td></tr>';
                } else {
                    tbody.innerHTML = recent.map(s => `
                        <tr style="cursor:pointer" onclick="window.location.href='/students/${s.studentId}/profile'">
                            <td><strong>${s.fullName}</strong></td>
                            <td>${s.sundayClass ? s.sundayClass.className : '-'}</td>
                            <td><span class="badge ${s.active ? 'badge-active' : 'badge-inactive'}">${s.active ? 'Active' : 'Inactive'}</span></td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                showToast('Failed to load dashboard: ' + err.message, 'error');
            }
        })();
    </script>
</body>

</html>
