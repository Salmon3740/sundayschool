<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance — Sunday School</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Attendance</h1>
                    <p>Mark and view attendance records.</p>
                </div>
            </div>

            <!-- Teacher: Mark Attendance -->
            <div class="card mb-24 teacher-only" style="display:none">
                <div class="card-header">
                    <h2>✏️ Mark Attendance</h2>
                </div>
                <div class="grid-3 mb-16">
                    <div class="form-group">
                        <label>Select Class</label>
                        <select class="form-control" id="attClassSelect">
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" class="form-control" id="attDate">
                    </div>
                    <div class="form-group" style="display:flex;align-items:flex-end;gap:8px">
                        <button class="btn btn-success btn-sm" onclick="markAllClass(true)">✅ All Present</button>
                        <button class="btn btn-danger btn-sm" onclick="markAllClass(false)">❌ All Absent</button>
                    </div>
                </div>
                <div id="attendanceStudents" class="attendance-list"></div>
                <button class="btn btn-primary mt-16" id="saveAttBtn" onclick="saveAttendance()">Save
                    Attendance</button>
            </div>

            <!-- View Attendance Records -->
            <div class="card">
                <div class="card-header">
                    <h2>📊 Attendance Records</h2>
                    <div class="flex-row">
                        <input type="date" class="form-control" id="viewDate" style="max-width:180px"
                            onchange="loadAttByDate()">
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="attRecords">
                            <tr>
                                <td colspan="3">
                                    <div class="empty-state">
                                        <p>Select a date to view records</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
    <script>
        initLayout();
        let classStudents = [];

        // Set today's date
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('attDate').value = today;

        (async function init() {
            try {
                const classes = await apiFetch('/api/classes');
                const sel = document.getElementById('attClassSelect');
                sel.innerHTML = classes.map(c => `<option value="${c.classId}">${c.className}</option>`).join('');
                if (classes.length > 0) loadClassStudents(classes[0].classId);
                sel.addEventListener('change', (e) => loadClassStudents(e.target.value));
            } catch (e) { }
        })();

        async function loadClassStudents(classId) {
            try {
                classStudents = await apiFetch('/api/classes/' + classId + '/students');
                const container = document.getElementById('attendanceStudents');
                container.innerHTML = classStudents.map(s => `
                    <div class="attendance-row" data-id="${s.studentId}">
                        <span><strong>${s.fullName}</strong></span>
                        <label class="toggle-switch">
                            <input type="checkbox" checked data-student="${s.studentId}">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                `).join('');
            } catch (e) { showToast('Failed to load students', 'error'); }
        }

        async function markAllClass(present) {
            const classId = document.getElementById('attClassSelect').value;
            const date = document.getElementById('attDate').value;
            if (!classId || !date) { showToast('Select class and date', 'error'); return; }
            try {
                await apiFetch('/api/attendance/mark-class?classId=' + classId + '&date=' + date + '&present=' + present, { method: 'POST' });
                showToast('All marked ' + (present ? 'present' : 'absent') + '!', 'success');
                // Update toggles
                document.querySelectorAll('#attendanceStudents input[type="checkbox"]').forEach(cb => cb.checked = present);
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function saveAttendance() {
            const date = document.getElementById('attDate').value;
            if (!date) { showToast('Select a date', 'error'); return; }
            const checkboxes = document.querySelectorAll('#attendanceStudents input[type="checkbox"]');
            try {
                for (const cb of checkboxes) {
                    await apiFetch('/api/attendance/mark?studentId=' + cb.dataset.student + '&date=' + date + '&present=' + cb.checked, { method: 'POST' });
                }
                showToast('Attendance saved!', 'success');
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function loadAttByDate() {
            const date = document.getElementById('viewDate').value;
            if (!date) return;
            try {
                const records = await apiFetch('/api/attendance/date/' + date);
                const tbody = document.getElementById('attRecords');
                if (records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><p>No records for this date</p></div></td></tr>';
                } else {
                    tbody.innerHTML = records.map(r => `
                        <tr>
                            <td><strong>${r.student ? r.student.fullName : 'Unknown'}</strong></td>
                            <td>${formatDate(r.attendanceDate)}</td>
                            <td><span class="badge ${r.present ? 'badge-present' : 'badge-absent'}">${r.present ? 'Present' : 'Absent'}</span></td>
                        </tr>
                    `).join('');
                }
            } catch (e) { showToast(e.message, 'error'); }
        }
    </script>
</body>

</html>
